<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" fill="none">
  <rect width="560" height="320" rx="12" fill="#fffcf5" stroke="#ddd3c4"/>
  <!-- Title bar -->
  <rect y="0" width="560" height="36" rx="12" fill="#f5ead6"/>
  <rect y="12" width="560" height="24" fill="#f5ead6"/>
  <circle cx="18" cy="18" r="5" fill="#e8a0a0"/>
  <circle cx="34" cy="18" r="5" fill="#e8d4a0"/>
  <circle cx="50" cy="18" r="5" fill="#a0d4a0"/>
  <text x="280" y="22" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#6b5d4f">EGB NL-to-SQL</text>
  <!-- Query input -->
  <rect x="20" y="52" width="520" height="32" rx="6" fill="#fdf6ec" stroke="#ddd3c4"/>
  <text x="32" y="72" font-family="Inter,sans-serif" font-size="11" fill="#6b5d4f">What are Germany's 10Y yields for 2024?</text>
  <!-- SQL output -->
  <rect x="20" y="96" width="520" height="44" rx="6" fill="#2d2418"/>
  <text x="32" y="114" font-family="monospace" font-size="10" fill="#a0d4a0">SELECT date, yield FROM monthly_yields</text>
  <text x="32" y="128" font-family="monospace" font-size="10" fill="#a0d4a0">WHERE country='DE' AND maturity='10Y' AND year=2024</text>
  <!-- Chart area -->
  <rect x="20" y="152" width="520" height="148" rx="6" fill="#fdf6ec" stroke="#ddd3c4"/>
  <!-- Y axis labels -->
  <text x="36" y="172" font-family="Inter,sans-serif" font-size="9" fill="#6b5d4f">2.8%</text>
  <text x="36" y="208" font-family="Inter,sans-serif" font-size="9" fill="#6b5d4f">2.4%</text>
  <text x="36" y="244" font-family="Inter,sans-serif" font-size="9" fill="#6b5d4f">2.0%</text>
  <text x="36" y="280" font-family="Inter,sans-serif" font-size="9" fill="#6b5d4f">1.6%</text>
  <!-- Grid lines -->
  <line x1="60" y1="168" x2="520" y2="168" stroke="#e6ddd0" stroke-width="0.5"/>
  <line x1="60" y1="204" x2="520" y2="204" stroke="#e6ddd0" stroke-width="0.5"/>
  <line x1="60" y1="240" x2="520" y2="240" stroke="#e6ddd0" stroke-width="0.5"/>
  <line x1="60" y1="276" x2="520" y2="276" stroke="#e6ddd0" stroke-width="0.5"/>
  <!-- Yield curve line -->
  <polyline points="70,220 110,210 150,230 190,200 230,190 270,195 310,185 350,180 390,192 430,205 470,198 510,188" stroke="#4a7349" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Data dots -->
  <circle cx="70" cy="220" r="3" fill="#4a7349"/>
  <circle cx="150" cy="230" r="3" fill="#4a7349"/>
  <circle cx="230" cy="190" r="3" fill="#4a7349"/>
  <circle cx="310" cy="185" r="3" fill="#4a7349"/>
  <circle cx="390" cy="192" r="3" fill="#4a7349"/>
  <circle cx="510" cy="188" r="3" fill="#4a7349"/>
  <!-- X axis labels -->
  <text x="70" y="295" font-family="Inter,sans-serif" font-size="8" fill="#6b5d4f">Jan</text>
  <text x="150" y="295" font-family="Inter,sans-serif" font-size="8" fill="#6b5d4f">Mar</text>
  <text x="230" y="295" font-family="Inter,sans-serif" font-size="8" fill="#6b5d4f">May</text>
  <text x="310" y="295" font-family="Inter,sans-serif" font-size="8" fill="#6b5d4f">Jul</text>
  <text x="390" y="295" font-family="Inter,sans-serif" font-size="8" fill="#6b5d4f">Sep</text>
  <text x="470" y="295" font-family="Inter,sans-serif" font-size="8" fill="#6b5d4f">Nov</text>
</svg>
